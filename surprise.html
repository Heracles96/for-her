<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Surprise 😏</title>

<style>
body{
  margin:0;
  background:#05070d;
  color:white;
  font-family:sans-serif;
  height:100vh;
  overflow:hidden;
  text-align:center;
}

/* Center text */
#text{
  position:absolute;
  top:20%;
  width:100%;
  font-size:1.4em;
}

/* Hidden dots */
.dot{
  position:absolute;
  width:12px;
  height:12px;
  border-radius:50%;
  background:#444;
  cursor:pointer;
  transition:0.3s;
}

.dot:hover{
  background:gold;
}

/* Result */
#result{
  position:absolute;
  top:40%;
  width:100%;
  font-size:1.5em;
  display:none;
  line-height:1.6;
}

/* Back */
#back{
  position:absolute;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  padding:10px 20px;
  border:none;
  border-radius:10px;
  background:gold;
  cursor:pointer;
}
</style>
</head>

<body>

<div id="text">Alright...<br>Find it.</div>

<div id="result"></div>

<button id="back" onclick="goBack()">Back</button>

<script>
const result = document.getElementById("result");

// ===== CREATE DOTS =====
for(let i=0; i<8; i++){
  let dot = document.createElement("div");
  dot.className = "dot";

  dot.style.top = Math.random()*80 + "%";
  dot.style.left = Math.random()*90 + "%";

  dot.onclick = wrongClick;

  document.body.appendChild(dot);
}

// ===== CORRECT DOT =====
let correct = document.createElement("div");
correct.className = "dot";

correct.style.top = "55%";
correct.style.left = "60%";
correct.style.background = "#666";

correct.onclick = correctClick;

document.body.appendChild(correct);

// ===== WRONG CLICK =====
function wrongClick(){
  document.getElementById("text").innerText = "Nope. Try again.";
}

// ===== CORRECT CLICK =====
function correctClick(){

  document.querySelectorAll(".dot").forEach(d => d.style.display = "none");
  document.getElementById("text").style.display = "none";

  result.style.display = "block";

  result.innerText = "There you go.";

  setTimeout(()=>{
    result.innerText = "Knew you'd find it.";
  },1200);

  setTimeout(()=>{
    result.innerText = "Just a little something...\n\nYou make me smile.\nMore than you realize.";
  },2400);
}

// ===== BACK =====
function goBack(){
  window.location.href = "index.html";
}
</script>

</body>
</html>
