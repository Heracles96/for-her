<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Talking Meter 💬</title>

<style>
body{
  margin:0;
  background:#05070d;
  color:white;
  font-family:sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  text-align:center;
}

/* Container */
#container{
  width:90%;
  max-width:400px;
}

/* Text */
#text{
  font-size:1.4em;
  margin-bottom:30px;
  min-height:60px;
  transition:0.3s;
}

/* Slider */
input[type="range"]{
  width:100%;
  -webkit-appearance:none;
  height:6px;
  border-radius:5px;
  background:#333;
  outline:none;
}

input[type="range"]::-webkit-slider-thumb{
  -webkit-appearance:none;
  width:18px;
  height:18px;
  border-radius:50%;
  background:gold;
  cursor:pointer;
}

/* Percentage */
#percent{
