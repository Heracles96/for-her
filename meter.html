<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Talking Meter 💬</title>

<style>
body{
  margin:0;
  background:#05070d;
  color:white;
  font-family:sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  text-align:center;
  overflow:hidden;
}

#container{
  width:90%;
  max-width:450px;
}

/* Intro text */
#intro{
  font-size:1.4em;
  min-height:80px;
  transition:0.5s;
}

/* Heading */
#heading{
  display:none;
  font-size:1.3em;
  margin-bottom:20px;
}

/* Slider */
#slider{
  display:none;
  width:100%;
  height:8px;
}

input[type="range"]{
  width:100%;
}

/* Dynamic text */
#dynamic{
  margin-top:20px;
  min-height:50px;
  font-size:1.2em;
}

/* Back */
#back{
  position:absolute;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  padding:10px 20px;
  border:none;
  border-radius:10px;
  background:gold;
  cursor:pointer;
}
</style>
</head>

<body>

<div id="container">
  <div id="intro"></div>

  <div id="heading">How much I like talking to you</div>

  <input type="range" min="0" max="100" value="40" id="slider">

  <div id="dynamic"></div>
</div>

<button id="back" onclick="goBack()">Back</button>

<script>
const intro = document.getElementById("intro");
const heading = document.getElementById("heading");
const slider = document.getElementById("slider");
const dynamic = document.getElementById("dynamic");

// ===== INTRO SEQUENCE =====
const lines = [
"This meter was designed by Dr. Harsh.",
"It's 100% accurate.",
"Most people don't get to use it...",
"It usually costs $100.",
"But for now...",
"You can use it for free.",
"Let's test it."
];

let i = 0;

function playIntro(){
  if(i < lines.length){
    intro.style.opacity = 0;

    setTimeout(()=>{
      intro.innerText = lines[i];
      intro.style.opacity = 1;
      i++;
      setTimeout(playIntro, 1300);
    },400);
  } else {
    showMeter();
  }
}

// ===== SHOW METER =====
function showMeter(){
  intro.style.display = "none";
  heading.style.display = "block";
  slider.style.display = "block";
}

// ===== SLIDER LOGIC =====
slider.addEventListener("input", ()=>{
  updateText(slider.value);
});

// Resistance effect
slider.addEventListener("input", ()=>{
  if(slider.value < 100){
    slider.value = Math.min(100, parseInt(slider.value) + 0.5);
  }
});

// Auto push to 100 on release
slider.addEventListener("change", ()=>{
  let interval = setInterval(()=>{
    if(slider.value < 100){
      slider.value++;
      updateText(slider.value);
    } else {
      clearInterval(interval);
      finalMessage();
    }
  },15);
});

// ===== TEXT LOGIC =====
function updateText(val){
  if(val < 20){
    dynamic.innerText = "No... that's not it.";
  } else if(val < 40){
    dynamic.innerText = "Still not right.";
  } else if(val < 60){
    dynamic.innerText = "Hmm...";
  } else if(val < 80){
    dynamic.innerText = "Closer.";
  } else if(val < 95){
    dynamic.innerText = "Now you're getting it.";
  } else if(val < 100){
    dynamic.innerText = "Yeah...";
  }
}

// ===== FINAL MESSAGE =====
function finalMessage(){
  dynamic.innerText = "This much.";

  setTimeout(()=>{
    dynamic.innerText = "I like talking to you that much...";
  },1200);

  setTimeout(()=>{
    dynamic.innerText = "that I actually wait for your text.";
  },2400);

  setTimeout(()=>{
    dynamic.innerText += "\nYeah... it's that bad.";
  },3800);
}

// ===== BACK =====
function goBack(){
  window.location.href = "index.html";
}

// START
playIntro();
</script>

</body>
</html>
