<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Talking Meter 💬</title>

<style>
body{
  margin:0;
  background:#05070d;
  color:white;
  font-family:sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  text-align:center;
}

#container{
  width:90%;
  max-width:500px;
}

h2{
  margin-bottom:20px;
}

/* Slider */
input[type="range"]{
  width:100%;
  -webkit-appearance:none;
  height:8px;
  border-radius:5px;
  background:#333;
  outline:none;
}

input[type="range"]::-webkit-slider-thumb{
  -webkit-appearance:none;
  width:20px;
  height:20px;
  border-radius:50%;
  background:gold;
  cursor:pointer;
}

/* Text */
#dynamic{
  margin-top:20px;
  min-height:60px;
  font-size:1.2em;
  transition:0.3s;
}

/* Buttons */
button{
  margin-top:20px;
  padding:10px 20px;
  border:none;
  border-radius:10px;
  background:gold;
  cursor:pointer;
  font-weight:bold;
}

#back{
  position:absolute;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
}
</style>
</head>

<body>

<div id="container">
  <h2>How much I like talking to you</h2>

  <input type="range" min="0" max="100" step="0.1" value="0" id="slider">

  <div id="dynamic">Try moving it.</div>

  <button onclick="resetMeter()">Reset</button>
</div>

<button id="back" onclick="goBack()">Back</button>

<script>
const slider = document.getElementById("slider");
const dynamic = document.getElementById("dynamic");

let isDragging = false;
let reached100 = false;
let autoMoving = false;

// ===== DRAG EVENTS =====
slider.addEventListener("mousedown", ()=> isDragging = true);
slider.addEventListener("touchstart", ()=> isDragging = true);

slider.addEventListener("mouseup", ()=>{
  isDragging = false;
  if(!reached100) autoComplete();
});

slider.addEventListener("touchend", ()=>{
  isDragging = false;
  if(!reached100) autoComplete();
});

// ===== MAIN MOVEMENT =====
slider.addEventListener("input", ()=>{
  let val = parseFloat(slider.value);

  if(reached100){
    slider.value = 100;
    dynamic.innerText = "Your response is already recorded.\nWe don't accept fake data.";
    return;
  }

  // Resistance when going backward
  if(val < lastValue){
    val = val + (lastValue - val) * 0.7; // slows backward movement
  }

  // Subtle upward assist
  if(val > 40 && val < 70){
    val += 0.2;
  } else if(val >= 70 && val < 90){
    val += 0.4;
  } else if(val >= 90){
    val += 0.8;
  }

  slider.value = Math.min(val, 100);
  updateText(slider.value);

  lastValue = slider.value;
});

let lastValue = 0;

// ===== AUTO COMPLETE =====
function autoComplete(){
  autoMoving = true;

  let interval = setInterval(()=>{
    let val = parseFloat(slider.value);

    if(val < 100){
      slider.value = val + 1;
      updateText(slider.value);
    } else {
      clearInterval(interval);
      reached100 = true;
      finalMessage();
    }
  }, 20);
}

// ===== TEXT SYSTEM =====
function updateText(val){
  val = Math.floor(val);

  if(val < 10){
    dynamic.innerText = "No... that's not right.";
  } else if(val < 20){
    dynamic.innerText = "Still too low.";
  } else if(val < 30){
    dynamic.innerText = "Not even close.";
  } else if(val < 40){
    dynamic.innerText = "You're underestimating it.";
  } else if(val < 50){
    dynamic.innerText = "Hmm... still not there.";
  } else if(val < 60){
    dynamic.innerText = "Getting closer.";
  } else if(val < 70){
    dynamic.innerText = "Now you're starting to get it.";
  } else if(val < 80){
    dynamic.innerText = "Almost there.";
  } else if(val < 90){
    dynamic.innerText = "This is more like it.";
  } else if(val < 100){
    dynamic.innerText = "Just a little more.";
  }
}

// ===== FINAL MESSAGE =====
function finalMessage(){
  dynamic.innerText = "This much.";

  setTimeout(()=>{
    dynamic.innerText = "I like talking to you that much...";
  },1200);

  setTimeout(()=>{
    dynamic.innerText = "that I actually wait for your text.";
  },2400);
}

// ===== RESET =====
function resetMeter(){
  slider.value = 0;
  lastValue = 0;
  reached100 = false;
  autoMoving = false;
  dynamic.innerText = "Try moving it.";
}

// ===== BACK =====
function goBack(){
  window.location.href = "index.html";
}
</script>

</body>
</html>
